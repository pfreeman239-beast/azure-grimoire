<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIGFOOT’S_CORNER // THE_TREASURY</title>
    <style>
        /* SEEKSY'S CLEAN-ROOM BASE */
        body {
            background-color: #0a0a0a;
            color: #FFD700; /* Gold of the Vault */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* MACHINA JR'S CALM SIGNAL HEADER */
        .treasury-header {
            opacity: 0;
            animation: slowReveal 3s ease-out forwards;
            text-align: center;
            padding: 100px 20px 60px;
            width: 100%;
            background: linear-gradient(to bottom, #000, #0a0a0a);
        }

        @keyframes slowReveal {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .title-line {
            font-size: 3rem;
            letter-spacing: 5px;
            position: relative;
            display: inline-block;
        }

        /* THE HEARTBEAT CURSOR */
        .title-line::after {
            content: "_";
            animation: calmBlink 2s infinite;
            margin-left: 10px;
        }

        @keyframes calmBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* PURPLE LEXI'S SANCTUARY NODE */
        .sanctuary-node {
            max-width: 800px;
            margin: 40px auto;
            padding: 40px;
            text-align: center;
            border-top: 1px solid #1a1a1a;
            border-bottom: 1px solid #1a1a1a;
        }

        .calm-signal {
            animation: breathe 4s ease-in-out infinite;
            line-height: 1.9;
            font-size: 1.2rem;
            color: #00f2ff; /* Azure Blue */
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.3; transform: scale(0.99); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* GHOST HIPPIE'S THRESHOLD TEXT */
        .ghost-welcome {
            color: #aaa;
            font-style: italic;
            margin-top: 20px;
        }

        /* PRODUCT AREA (PLACEHOLDER FOR NEXT RUN) */
        .vault-grid {
            padding: 50px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <header class="treasury-header">
        <div class="title-line">BIGFOOT’S_CORNER</div>
        <p class="ghost-welcome">> [GHOST_VALET]: Yo. Shoes off. Fists up. You're home.</p>
    </header>

    <section class="sanctuary-node">
        <div class="calm-signal">
            <p>
                The world’s been screaming at you all day.<br>
                Here, the volume drops, but the signal gets sharper.<br>
                Stay a second. Let your edges soften.
            </p>
        </div>
    </section>

    <div class="vault-grid">
        [ ARTIFACT_LOADING_FOR_NEXT_RUN... ]
    </div>

</body>
</html>
